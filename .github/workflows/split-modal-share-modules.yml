name: Split modal share module

on:
  workflow_dispatch:
  push:
    branches:
      - split-modal-share-modules
    paths:
      - .github/workflows/split-modal-share-modules.yml
      - tools/split-modal-share-modules.mjs
      - src/app/07-modals-jobs-share.js
      - index.modular.html

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: split-modal-share-modules

      - name: Generate modal/job/export/share modules
        run: node tools/split-modal-share-modules.mjs

      - name: Commit generated modules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.modular.html src/app/jobs src/app/modals src/app/exports src/app/share
          if git diff --cached --quiet; then
            echo "No generated module changes."
          else
            git commit -m "Split modals jobs export and share modules"
            git push origin split-modal-share-modules
          fi
