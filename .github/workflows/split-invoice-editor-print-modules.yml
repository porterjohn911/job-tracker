name: Split invoice editor print module

on:
  workflow_dispatch:
  push:
    branches:
      - split-invoice-editor-print-modules
    paths:
      - .github/workflows/split-invoice-editor-print-modules.yml
      - tools/split-invoice-editor-print-modules.mjs
      - src/app/08-invoice-editor-print.js
      - index.modular.html

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: split-invoice-editor-print-modules

      - name: Generate invoice editor print modules
        run: node tools/split-invoice-editor-print-modules.mjs

      - name: Commit generated modules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.modular.html src/app/invoice-editor
          if git diff --cached --quiet; then
            echo "No generated module changes."
          else
            git commit -m "Split invoice editor print modules"
            git push origin split-invoice-editor-print-modules
          fi
