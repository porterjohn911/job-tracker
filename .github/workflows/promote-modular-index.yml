name: Promote modular index

on:
  workflow_dispatch:
  push:
    branches:
      - promote-modular-index
    paths:
      - .github/workflows/promote-modular-index.yml
      - index.html
      - index.modular.html

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: promote-modular-index

      - name: Promote tested modular page
        run: |
          cp index.html index.legacy.html
          cp index.modular.html index.html

      - name: Verify promoted index has modular assets
        run: |
          test -f index.legacy.html
          grep -q './src/styles.css' index.html
          grep -q './src/app/boot/07-boot.js' index.html
          grep -q '<style>' index.legacy.html

      - name: Commit promoted index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html index.legacy.html
          if git diff --cached --quiet; then
            echo "No promotion changes."
          else
            git commit -m "Promote modular index with legacy backup"
            git push origin promote-modular-index
          fi
