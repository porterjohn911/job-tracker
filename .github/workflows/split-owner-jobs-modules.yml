name: Split owner jobs module

on:
  workflow_dispatch:
  push:
    branches:
      - split-owner-jobs-modules
    paths:
      - .github/workflows/split-owner-jobs-modules.yml
      - tools/split-owner-jobs-modules.mjs
      - src/app/05-owner-reports-map-notifications.js
      - index.modular.html

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: split-owner-jobs-modules

      - name: Generate owner/reports/map/jobs modules
        run: node tools/split-owner-jobs-modules.mjs

      - name: Commit generated modules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.modular.html src/app/views/*.js
          if git diff --cached --quiet; then
            echo "No generated module changes."
          else
            git commit -m "Split owner reports map and jobs views"
            git push origin split-owner-jobs-modules
          fi
