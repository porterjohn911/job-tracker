function renderCalMonth(y,m,daysInMonth,startDow,byDay,today,sel){
  const MAX_CHIPS=3;
  let cells='';
  const DOW=['S','M','T','W','T','F','S'];
  DOW.forEach(d=>cells+=`<div class="cal-dow">${d}</div>`);
  // Leading days from previous month
  const prevDays=new Date(y,m,0).getDate();
  for(let i=startDow-1;i>=0;i--){
    const d=prevDays-i;
    const prevM=m===0?11:m-1;
    const prevY=m===0?y-1:y;
    const k=`${prevY}-${String(prevM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells+=renderCalCell(k,d,byDay,today,sel,true,MAX_CHIPS);
  }
  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells+=renderCalCell(k,d,byDay,today,sel,false,MAX_CHIPS);
  }
  // Trailing days to fill final week
  const filled=startDow+daysInMonth;
  const trailing=(7-filled%7)%7;
  for(let i=1;i<=trailing;i++){
    const nextM=m===11?0:m+1;
    const nextY=m===11?y+1:y;
    const k=`${nextY}-${String(nextM+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    cells+=renderCalCell(k,i,byDay,today,sel,true,MAX_CHIPS);
  }
  return `<div class="cal-grid">${cells}</div>`;
}

function renderCalCell(k,dayNum,byDay,today,sel,otherMonth,maxChips){
  const list=byDay[k]||[];
  const isToday=k===today;
  const isSel=k===sel;
  const cls='cal-day'+(isToday?' today':'')+(isSel?' selected':'')+(otherMonth?' other-month':'');
  const visible=list.slice(0,maxChips);
  const overflow=list.length-visible.length;
  const chips=visible.map(({job,dayIdx,totalDays})=>{
    const contLeft=dayIdx>0;
    const contRight=dayIdx<totalDays-1;
    const isWeekStart=new Date(k+'T00:00:00').getDay()===0;
    const isWeekEnd=new Date(k+'T00:00:00').getDay()===6;
    let contCls='';
    if(contLeft&&contRight)contCls=isWeekStart?'continues-right':(isWeekEnd?'continues-left':'continues-both');
    else if(contLeft)contCls=isWeekStart?'':'continues-left';
    else if(contRight)contCls=isWeekEnd?'':'continues-right';
    // On wrap to a new week, restart the chip with a left border
    const label=(!contLeft||isWeekStart)?esc(job.name):'';
    return `<div class="cal-chip ${chipClass(job.status)} ${contCls}" data-open="${job.id}" title="${esc(job.name)} · ${spLabel(job.status)}${totalDays>1?' · day '+(dayIdx+1)+'/'+totalDays:''}">${label||'&nbsp;'}</div>`;
  }).join('');
  const more=overflow>0?`<div class="cal-day-more" data-cal-day="${k}">+${overflow} more</div>`:'';
  return `<div class="${cls}" data-cal-day="${k}"><div class="cal-day-num"><span>${dayNum}</span></div><div class="cal-day-chips">${chips}${more}</div></div>`;
}

function renderSelectedDay(byDay,sel,today){
  const selList=(byDay[sel]||[]).slice();
  // Sort: leads first? Or by status priority. Use status order: lead, active, complete, hold
  const order={lead:0,active:1,complete:2,hold:3};
  selList.sort((a,b)=>(order[a.job.status]??9)-(order[b.job.status]??9));
  const dt=new Date(sel+'T00:00:00');
  const lbl=dt.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  const isToday=sel===today;
  return `<div class="cal-day-list">
    <div class="cal-day-list-hd"><span>${esc(lbl)}${isToday?' <span class="kpi-sub" style="color:var(--green-700);font-weight:700;margin-left:6px">Today</span>':''}</span><span class="kpi-sub">${selList.length} job${selList.length!==1?'s':''}</span></div>
    ${selList.length===0?'<p style="font-size:12.5px;color:var(--text-3);padding:4px 0">Nothing scheduled. Tap a date above with jobs to see what\'s on the books.</p>'
      :selList.map(({job,dayIdx,totalDays})=>`<div class="cal-job-row" data-open="${job.id}">
        <div class="cal-job-row-bar" style="background:${chipBarColor(job.status)}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600">${esc(job.name)}${totalDays>1?` <span class="cal-job-row-day">Day ${dayIdx+1}/${totalDays}</span>`:''}</div>
          <div class="cal-job-row-meta">${esc(job.address||'No address')}${job.assigned?' · '+esc(job.assigned):''}${job.customerName?' · '+esc(job.customerName):''}</div>
        </div>
        <span class="status-pill ${spClass(job.status)}">${spLabel(job.status)}</span>
      </div>`).join('')}
  </div>`;
}

function renderCalAgenda(byDay,today){
  // Show today plus next 14 days that have anything scheduled
  const days=[];
  const start=new Date(today+'T00:00:00');
  for(let i=0;i<21;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const k=dateKey(d);
    if(byDay[k]&&byDay[k].length){
      days.push({k,date:d,list:byDay[k]});
    }
  }
  if(days.length===0){
    return `<div class="cal-day-list" style="text-align:center;padding:40px 24px">
      <p style="font-size:14px;color:var(--text-2);margin-bottom:6px">Nothing scheduled in the next 3 weeks.</p>
      <p style="font-size:12.5px;color:var(--text-3)">Add a start date (and optional due date) to a job to see it here.</p>
    </div>`;
  }
  return days.map(({k,date,list})=>{
    const isToday=k===today;
    const lbl=date.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
    const order={lead:0,active:1,complete:2,hold:3};
    const sorted=list.slice().sort((a,b)=>(order[a.job.status]??9)-(order[b.job.status]??9));
    return `<div class="agenda-day">
      <div class="agenda-day-hd">${esc(lbl)} ${isToday?'<span class="today-pill">TODAY</span>':''}<span style="margin-left:auto;color:var(--text-3);font-weight:600">${sorted.length} job${sorted.length!==1?'s':''}</span></div>
      ${sorted.map(({job,dayIdx,totalDays})=>`<div class="cal-job-row" data-open="${job.id}">
        <div class="cal-job-row-bar" style="background:${chipBarColor(job.status)}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600">${esc(job.name)}${totalDays>1?` <span class="cal-job-row-day">Day ${dayIdx+1}/${totalDays}</span>`:''}</div>
          <div class="cal-job-row-meta">${esc(job.address||'No address')}${job.assigned?' · '+esc(job.assigned):''}</div>
        </div>
        <span class="status-pill ${spClass(job.status)}">${spLabel(job.status)}</span>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function docCategory(d){return d&&d.category && DOC_CAT[d.category] ? d.category : 'other'}
function getAllDocsRaw(){
  const out=[];
  Object.values(S.jobs).forEach(j=>{
    (j.documents||[]).forEach((d,idx)=>{
      out.push({doc:d,job:j,idx,category:docCategory(d)});

function getAllDocsByCategory(cat){
  if(cat==='contract')return getAllDocsRaw().filter(x=>x.category==='contract');

}

// ══ Receipts: categories, helpers, view, modal ══
// pct = % deductible per IRS guidance (Schedule C / Form 1120). meals=50%, others=100%.
const RECEIPT_CAT_ORDER=['materials','tools','rental','fuel','vehicle','subcontractor','meals','travel','office','insurance','permits','utilities','safety','training','advertising','professional','other'];
const RECEIPT_CAT={
  materials:{label:'Materials & Supplies',deductible:true,pct:100},
  tools:{label:'Tools (under $2,500)',deductible:true,pct:100},
  rental:{label:'Equipment Rental',deductible:true,pct:100},
  fuel:{label:'Vehicle Fuel',deductible:true,pct:100},
  vehicle:{label:'Vehicle Repair / Maint.',deductible:true,pct:100},
  subcontractor:{label:'Subcontractor',deductible:true,pct:100},
  meals:{label:'Meals (50% deductible)',deductible:true,pct:50},
  travel:{label:'Travel & Lodging',deductible:true,pct:100},
  office:{label:'Office Supplies',deductible:true,pct:100},
  insurance:{label:'Insurance',deductible:true,pct:100},
  permits:{label:'Licenses & Permits',deductible:true,pct:100},
  utilities:{label:'Utilities',deductible:true,pct:100},
  safety:{label:'Safety Equipment / PPE',deductible:true,pct:100},
  training:{label:'Training / Education',deductible:true,pct:100},
  advertising:{label:'Advertising',deductible:true,pct:100},
  professional:{label:'Professional Services',deductible:true,pct:100},
  other:{label:'Other / Personal',deductible:false,pct:0},
};
// Distinct, accessible colors for each receipt category (used in charts & legend)
const RECEIPT_CAT_COLORS={
  materials:'#1a6e55',
  tools:'#0369a1',
  rental:'#d97706',
  fuel:'#dc2626',
  vehicle:'#7c3aed',
  subcontractor:'#0891b2',
  meals:'#f59e0b',
  travel:'#ec4899',
  office:'#6366f1',
  insurance:'#14b8a6',
  permits:'#65a30d',
  utilities:'#f97316',
  safety:'#eab308',
  training:'#a855f7',
  advertising:'#06b6d4',
  professional:'#8b5cf6',
  other:'#64748b',
};
// Cycle of customer bar colors
const CUSTOMER_BAR_COLORS=['#1a6e55','#0369a1','#d97706','#7c3aed','#dc2626','#0891b2','#ec4899','#14b8a6'];

function recCat(r){return r&&r.category&&RECEIPT_CAT[r.category]?r.category:'other'}
function moneyCents(n){const v=Number(n||0);return '$'+v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function allReceipts(){return Object.values(S.receipts||{})}
function inRange(dateStr,range){
  if(!dateStr)return range==='all';
  if(range==='all')return true;
  const d=new Date(dateStr+(dateStr.length===10?'T00:00:00':''));
  const now=new Date();
  if(range==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(range==='qtr'){const q=Math.floor(now.getMonth()/3);return d.getFullYear()===now.getFullYear()&&Math.floor(d.getMonth()/3)===q}
  if(range==='ytd')return d.getFullYear()===now.getFullYear();
  if(range==='lastyear')return d.getFullYear()===now.getFullYear()-1;
  return true;
}
function receiptDeductible(r){const cat=RECEIPT_CAT[recCat(r)];if(!cat||!cat.deductible||r.deductible===false)return 0;return Number(r.amount||0)*(cat.pct/100)}
function receiptsForJob(jobId){return allReceipts().filter(r=>r.jobId===jobId)}

function renderReceiptCharts(list,total){
  if(!list.length)return '';

  // ── Category totals (descending, only non-zero) ──
  const catTotals={};
  list.forEach(r=>{const k=recCat(r);catTotals[k]=(catTotals[k]||0)+Number(r.amount||0)});
  const catRows=Object.entries(catTotals)
    .filter(([,v])=>v>0)
    .sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>({key:k,label:RECEIPT_CAT[k].label,color:RECEIPT_CAT_COLORS[k]||'#64748b',value:v,pct:total>0?v/total*100:0}));

  // ── Donut SVG ──
  const r=65,cx=80,cy=80,sw=22;
  const circ=2*Math.PI*r;
  let acc=0;
  const arcs=catRows.map(seg=>{
    const dash=(seg.pct/100)*circ;
    const arc=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${sw}"
      stroke-dasharray="${dash.toFixed(2)} ${(circ-dash).toFixed(2)}"
      stroke-dashoffset="${(-acc).toFixed(2)}">
      <title>${esc(seg.label)} — ${moneyCents(seg.value)} (${seg.pct.toFixed(1)}%)</title>
    </circle>`;
    acc+=dash;
    return arc;
  }).join('');

  const legend=catRows.map(seg=>`
    <div class="rec-legend-row ${S.recCatFilter===seg.key?'active':''}" data-rec-catfilter="${seg.key}" title="Click to filter list">
      <div class="rec-legend-dot" style="background:${seg.color}"></div>
      <div class="rec-legend-name">${esc(seg.label)}</div>
      <div class="rec-legend-val">${moneyCents(seg.value)}</div>
      <div class="rec-legend-pct">${seg.pct.toFixed(0)}%</div>
    </div>
  `).join('');

  // ── Customer totals (group by job.customerName) ──
  const byCust={};
  list.forEach(rec=>{
    let key,name;
    if(rec.jobId&&S.jobs[rec.jobId]){
      const j=S.jobs[rec.jobId];
      name=(j.customerName||'').trim()||'(no customer)';
      key='c:'+name.toLowerCase();
    }else{
      key='__overhead__';name='Overhead / Unassigned';
    }
    if(!byCust[key])byCust[key]={key,name,total:0,ded:0,count:0,jobIds:new Set()};
    byCust[key].total+=Number(rec.amount||0);
    byCust[key].ded+=receiptDeductible(rec);
    byCust[key].count++;
    if(rec.jobId)byCust[key].jobIds.add(rec.jobId);
  });
  const custRows=Object.values(byCust).sort((a,b)=>b.total-a.total);
  const maxCust=custRows.reduce((m,c)=>Math.max(m,c.total),0);
  const topCust=custRows.slice(0,8);

  const custBars=topCust.map((c,i)=>{
    const color=c.key==='__overhead__'?'#94a3b8':CUSTOMER_BAR_COLORS[i%CUSTOMER_BAR_COLORS.length];
    const pct=maxCust>0?(c.total/maxCust)*100:0;
    const dedPct=c.total>0?(c.ded/c.total)*100:0;
    return `<div class="hbar-row">
      <div class="hbar-top">
        <div class="hbar-name">${esc(c.name)}<small>${c.count} receipt${c.count!==1?'s':''}${c.jobIds.size?' · '+c.jobIds.size+' job'+(c.jobIds.size!==1?'s':''):''}</small></div>
        <div class="hbar-val">${moneyCents(c.total)}</div>
      </div>
      <div class="hbar-track" title="${moneyCents(c.ded)} deductible">
        <div class="hbar-fill" style="width:${pct.toFixed(2)}%;background:${color}"></div>
        <div class="hbar-fill-ded" style="width:${(pct*dedPct/100).toFixed(2)}%"></div>
      </div>
      <div class="hbar-meta">
        <span>${total>0?(c.total/total*100).toFixed(1):0}% of total spend</span>
        <span>${moneyCents(c.ded)} deductible</span>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="report-section">
      <div class="report-hd">Spending by Category <span class="kpi-sub">${catRows.length} categor${catRows.length===1?'y':'ies'} · click a slice or legend row to filter</span></div>
      <div class="rec-chart-grid">
        <div class="rec-donut-wrap">
          <div class="rec-donut">
            <svg viewBox="0 0 160 160" role="img" aria-label="Receipt spending by category">
              <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="${sw}"/>
              ${arcs}
            </svg>
            <div class="rec-donut-center">
              <div class="rec-donut-amt">${moneyCents(total)}</div>
              <div class="rec-donut-lbl">Total</div>
            </div>
          </div>
        </div>
        <div class="rec-legend">${legend}</div>
      </div>
    </div>

    <div class="report-section">
      <div class="report-hd">Spending by Customer <span class="kpi-sub">${custRows.length} customer${custRows.length===1?'':'s'}${custRows.length>topCust.length?' · top '+topCust.length+' shown':''}</span></div>
      <div class="hbar-list">${custBars}</div>
      <div style="font-size:11px;color:var(--text-3);margin-top:10px;display:flex;align-items:center;gap:6px">
        <span style="display:inline-block;width:11px;height:6px;border-radius:2px;background:rgba(22,163,74,0.55)"></span>
        Darker green overlay shows the tax-deductible portion of each customer's spend.
      </div>
    </div>
  `;
}

function renderReceiptsView(){
  const all=allReceipts();
  const range=S.recRange||'ytd';
  const inRangeList=all.filter(r=>inRange(r.date,range));
  // Stats over range
  const total=inRangeList.reduce((s,r)=>s+Number(r.amount||0),0);
  const ded=inRangeList.reduce((s,r)=>s+receiptDeductible(r),0);
  const linked=inRangeList.filter(r=>r.jobId).length;
  const unlinked=inRangeList.length-linked;
  // Category breakdown
  const byCat={};RECEIPT_CAT_ORDER.forEach(k=>byCat[k]={total:0,count:0,ded:0});
  inRangeList.forEach(r=>{const k=recCat(r);byCat[k].total+=Number(r.amount||0);byCat[k].count++;byCat[k].ded+=receiptDeductible(r)});
  // Job breakdown
  const byJob={};
  inRangeList.forEach(r=>{
    const key=r.jobId||'__none__';
    byJob[key]=byJob[key]||{total:0,count:0,name:r.jobId&&S.jobs[r.jobId]?S.jobs[r.jobId].name:'Overhead / Unassigned'};
    byJob[key].total+=Number(r.amount||0);byJob[key].count++;
  });
  const topJobs=Object.entries(byJob).sort((a,b)=>b[1].total-a[1].total).slice(0,5);

    <div class="filter-row" style="margin-bottom:12px">

      <div class="kpi-card"><div class="kpi-label">Tax-Deductible</div><div class="kpi-value" style="color:var(--green-700)">${moneyCents(ded)}</div><div class="kpi-sub">${total>0?Math.round(ded/total*100):0}% of total</div></div>
      <div class="kpi-card"><div class="kpi-label">Linked to Jobs</div><div class="kpi-value">${linked}</div><div class="kpi-sub">${unlinked} overhead / unassigned</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Receipt</div><div class="kpi-value">${moneyCents(inRangeList.length?total/inRangeList.length:0)}</div><div class="kpi-sub">in selected range</div></div>
    </div>

    ${renderReceiptCharts(inRangeList,total)}

    <div class="report-section">
      <div class="report-hd">By Category <span class="kpi-sub">click a tile to filter</span></div>
      <div class="rec-cat-grid">
        <div class="rec-cat-tile ${S.recCatFilter==='all'?'active':''}" data-rec-catfilter="all">
          <div class="rec-cat-tile-lbl">All Categories</div>
          <div class="rec-cat-tile-val">${moneyCents(total)}</div>
          <div class="rec-cat-tile-sub">${inRangeList.length} receipt${inRangeList.length!==1?'s':''}</div>
        </div>
        ${RECEIPT_CAT_ORDER.filter(k=>byCat[k].count>0).map(k=>`
          <div class="rec-cat-tile ${S.recCatFilter===k?'active':''}" data-rec-catfilter="${k}">
            <div class="rec-cat-tile-lbl">${esc(RECEIPT_CAT[k].label)}</div>
            <div class="rec-cat-tile-val">${moneyCents(byCat[k].total)}</div>
            <div class="rec-cat-tile-sub">${byCat[k].count} · ${moneyCents(byCat[k].ded)} ded.</div>
          </div>`).join('')}

}

function showReceiptModal(receiptId,presetJobId){
  const editing=receiptId&&S.receipts[receiptId];
  const r=editing?JSON.parse(JSON.stringify(S.receipts[receiptId])):{id:'r_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),date:dateKey(new Date()),vendor:'',amount:'',category:'materials',jobId:presetJobId||'',deductible:true,notes:'',photoUrl:'',created:Date.now(),user:S.user};
  const jobOpts=`<option value="">— Overhead / Unassigned —</option>`+Object.values(S.jobs).map(j=>`<option value="${esc(j.id)}" ${r.jobId===j.id?'selected':''}>${esc(j.name)}${j.customerName?' — '+esc(j.customerName):''}</option>`).join('');
  const catOpts=RECEIPT_CAT_ORDER.map(k=>`<option value="${k}" ${r.category===k?'selected':''}>${esc(RECEIPT_CAT[k].label)}</option>`).join('');

    <div class="modal-head"><div class="modal-title">${editing?'Edit Receipt':'Add Receipt'}</div><button class="modal-close" id="mc" aria-label="Close"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label class="form-label" for="rec-date">Date</label>
          <input type="date" class="form-input" id="rec-date" value="${esc(r.date||'')}">
        </div>
        <div class="form-group"><label class="form-label" for="rec-amount">Amount</label>
          <input type="number" step="0.01" min="0" class="form-input" id="rec-amount" value="${esc(r.amount||'')}" placeholder="0.00" inputmode="decimal">
        </div>
      </div>
      <div class="form-group"><label class="form-label" for="rec-vendor">Vendor / Payee</label>
        <input type="text" class="form-input" id="rec-vendor" value="${esc(r.vendor||'')}" placeholder="Home Depot, Lowe's, Shell…">
      </div>
      <div class="form-group"><label class="form-label" for="rec-category">Tax Category</label>
        <select class="form-select" id="rec-category">${catOpts}</select>
        <div id="rec-cat-note" style="font-size:11.5px;color:var(--text-3);margin-top:6px"></div>
      </div>
      <div class="form-group"><label class="form-label" for="rec-job">Job <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3)">(track where the money went)</span></label>
        <select class="form-select" id="rec-job">${jobOpts}</select>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;cursor:pointer">
          <input type="checkbox" id="rec-ded" ${r.deductible!==false?'checked':''} style="width:18px;height:18px;cursor:pointer">
          <span><strong>Tax deductible</strong> — uncheck if this is personal or non-business</span>
        </label>
      </div>
      <div class="form-group"><label class="form-label" for="rec-notes">Notes</label>
        <textarea class="form-textarea" id="rec-notes" rows="2" placeholder="Optional details">${esc(r.notes||'')}</textarea>
      </div>
      <div class="form-group"><label class="form-label">Receipt Photo <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3)">(optional — max 5MB)</span></label>
        ${r.photoUrl?`<div style="margin-bottom:8px"><img src="${r.photoUrl}" alt="Receipt" style="max-width:180px;max-height:180px;border-radius:8px;border:1px solid var(--border)"></div>`:''}
        <input type="file" id="rec-photo" class="form-input" accept="image/*">
      </div>
      <div style="display:flex;gap:8px;justify-content:space-between;margin-top:8px;flex-wrap:wrap">
        ${editing?`<button class="docs-menu-foot-btn" id="rec-delete" style="color:var(--red);border-color:var(--red)">Delete</button>`:'<div></div>'}
        <div style="display:flex;gap:8px">
          <button class="docs-menu-foot-btn" id="rec-cancel">Cancel</button>
          <button class="btn-add" id="rec-save" style="background:#7c3aed">${editing?'Save Changes':'Add Receipt'}</button>
        </div>
      </div>
    </div>
  </div></div>`;
  const noteEl=$('rec-cat-note');
  const updateNote=()=>{
    const c=RECEIPT_CAT[$('rec-category').value];
    if(!c){noteEl.textContent='';return}
    if(!c.deductible)noteEl.innerHTML='⚠️ This category is not tax-deductible by default.';
    else if(c.pct<100)noteEl.innerHTML=`Only <strong>${c.pct}%</strong> of this expense is deductible per IRS rules.`;
    else noteEl.innerHTML='Fully deductible business expense.';
  };
  updateNote();
  $('rec-category').onchange=()=>{
    const c=RECEIPT_CAT[$('rec-category').value];
    if(c)$('rec-ded').checked=c.deductible;
    updateNote();
  };
  $('mc').onclick=$('rec-cancel').onclick=closeModal;
  $('mbd').onclick=e=>{if(e.target===e.currentTarget)closeModal()};
  if(editing){
    $('rec-delete').onclick=async()=>{
      if(!confirm('Delete this receipt? This can be undone right after.'))return;
      const backup=JSON.parse(JSON.stringify(S.receipts[receiptId]));
      await deleteReceiptDB(receiptId);
      await logAct('deleted receipt from '+(backup.vendor||'vendor'),backup.jobId&&S.jobs[backup.jobId]?S.jobs[backup.jobId].name:'');
      closeModal();render();
      UNDO.push(async()=>{await writeReceipt(backup);render();toast('Receipt restored')});
      toast('Receipt deleted','undo',()=>{UNDO.pop()()});
    };
  }
  const doSave=async(photoUrl)=>{
    const rec={
      id:r.id,
      date:$('rec-date').value||dateKey(new Date()),
      vendor:$('rec-vendor').value.trim(),
      amount:parseFloat($('rec-amount').value)||0,
      category:$('rec-category').value,
      jobId:$('rec-job').value||'',
      deductible:$('rec-ded').checked,
      notes:$('rec-notes').value.trim(),
      photoUrl:photoUrl!==undefined?photoUrl:(r.photoUrl||''),
      created:r.created||Date.now(),
      updated:Date.now(),
      user:S.user||r.user||'',
    };
    if(rec.amount<=0){toast('Enter an amount','');return}
    if(!rec.vendor){toast('Enter a vendor','');return}
    await writeReceipt(rec);
    const jobName=rec.jobId&&S.jobs[rec.jobId]?S.jobs[rec.jobId].name:'overhead';
    await logAct((editing?'updated':'added')+' receipt from '+rec.vendor+' ('+moneyCents(rec.amount)+')',jobName==='overhead'?'':jobName);
    closeModal();render();toast(editing?'Receipt updated':'Receipt added');
  };
  $('rec-save').onclick=()=>{
    const file=$('rec-photo').files[0];
    if(file){
      if(file.size>5*1024*1024){toast('Photo too large (max 5MB)','');return}
      const reader=new FileReader();
      reader.onload=e=>doSave(e.target.result);
      reader.readAsDataURL(file);
    }else doSave();
  };
}

// ══ Invoices view (all invoices across all jobs) ══
function getAllInvoices(){
  const out=[];
  Object.values(S.jobs).forEach(j=>{
    (j.invoices||[]).forEach(inv=>out.push({inv,job:j}));
  });
  return out;
}

function agingBucket(days){
  // days = number of days OVERDUE (positive means past due)
  if(days<=0)return 0; // current / not yet due
  if(days<=30)return 1;
  if(days<=60)return 2;
  if(days<=90)return 3;
  return 4;
}

function renderInvoicesView(){
  const all=getAllInvoices();
  // Stats
  let totalInvoiced=0,totalPaid=0,outstanding=0,overdueAmt=0,overdueCount=0;
  const statusCounts={draft:0,sent:0,paid:0,overdue:0};
  // Aging buckets: 0=current, 1=1-30, 2=31-60, 3=61-90, 4=90+
  const aging=[0,0,0,0,0];
  const agingCounts=[0,0,0,0,0];
  // Top outstanding customers
  const byCustomer={};

  all.forEach(({inv,job})=>{
    const c=calcInvoice(inv);
    const st=invoiceStatus(inv);
    totalInvoiced+=c.total;
    totalPaid+=c.paid;
    outstanding+=c.balance;
    statusCounts[st]=(statusCounts[st]||0)+1;
    // Aging — only on unpaid balances
    if(c.balance>0.005){
      const due=inv.dueDate||inv.date;
      const daysOver=due?-(daysUntil(due)||0):0;
      const b=agingBucket(daysOver);
      aging[b]+=c.balance;
      agingCounts[b]++;
      if(st==='overdue'){overdueAmt+=c.balance;overdueCount++}
      // Customer aggregation
      const key=job.customerName||'(no name)';
      byCustomer[key]=byCustomer[key]||{name:key,jobs:new Set(),outstanding:0,overdue:0};
      byCustomer[key].jobs.add(job.id);
      byCustomer[key].outstanding+=c.balance;
      if(st==='overdue')byCustomer[key].overdue+=c.balance;
    }
  });
  const topCustomers=Object.values(byCustomer).sort((a,b)=>b.outstanding-a.outstanding).slice(0,5);

  // Filter + search + sort
  const q=S.invSearch.toLowerCase();
  let shown=all.filter(({inv,job})=>{
    if(S.invFilter!=='all'&&invoiceStatus(inv)!==S.invFilter)return false;
    if(!q)return true;
    const hay=((inv.number||'')+' '+(job.name||'')+' '+(job.customerName||'')+' '+(job.address||'')).toLowerCase();
    return hay.includes(q);
  });
  const sortFn={
    date:(a,b)=>(b.inv.date||'').localeCompare(a.inv.date||''),
    due:(a,b)=>(a.inv.dueDate||'9999').localeCompare(b.inv.dueDate||'9999'),
    amount:(a,b)=>calcInvoice(b.inv).total-calcInvoice(a.inv).total,
    balance:(a,b)=>calcInvoice(b.inv).balance-calcInvoice(a.inv).balance,
    number:(a,b)=>(b.inv.number||'').localeCompare(a.inv.number||''),
  }[S.invSort]||sortFn?.date;
  shown.sort(sortFn);

  const collectionRate=totalInvoiced>0?(totalPaid/totalInvoiced)*100:0;
  const statusChips=[
    ['all','All',all.length],
    ['draft','Draft',statusCounts.draft||0],
    ['sent','Sent',statusCounts.sent||0],
    ['overdue','Overdue',statusCounts.overdue||0],
    ['paid','Paid',statusCounts.paid||0],
  ];

  const agingLabels=['Current','1-30 days','31-60 days','61-90 days','90+ days'];

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;font-weight:700">Accounts Receivable</div>
        <div style="font-size:20px;font-weight:700;margin-top:2px">Invoices</div>
      </div>
      <button class="btn-add" id="btn-new-inv-global" aria-label="Create new invoice">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
        New Invoice
      </button>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card accent"><div class="kpi-label">Outstanding</div><div class="kpi-value">${money(outstanding)}</div><div class="kpi-sub">${all.filter(({inv})=>calcInvoice(inv).balance>0.005).length} unpaid</div></div>
      <div class="kpi-card"><div class="kpi-label">Overdue</div><div class="kpi-value" style="color:${overdueCount>0?'var(--red)':'var(--text)'}">${money(overdueAmt)}</div><div class="kpi-sub">${overdueCount} invoice${overdueCount!==1?'s':''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Collected</div><div class="kpi-value">${money(totalPaid)}</div><div class="kpi-sub">${collectionRate.toFixed(0)}% of invoiced</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Invoiced</div><div class="kpi-value">${money(totalInvoiced)}</div><div class="kpi-sub">${all.length} invoice${all.length!==1?'s':''}</div></div>
    </div>

    <div class="report-section">
      <div class="report-hd">Aging Report <span class="kpi-sub">Outstanding balances by age</span></div>
      <div class="aging-grid">
        ${agingLabels.map((lbl,i)=>`<div class="aging-cell bucket-${i}">
          <div class="aging-lbl">${lbl}</div>
          <div class="aging-val">${money(aging[i])}</div>
          <div class="aging-cnt">${agingCounts[i]} invoice${agingCounts[i]!==1?'s':''}</div>
        </div>`).join('')}
      </div>
    </div>

    ${topCustomers.length?`<div class="report-section">
      <div class="report-hd">Top Outstanding Customers</div>
      <div class="leaderboard top-customers">
        ${topCustomers.map((c,i)=>{
          const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
          return `<div class="lb-row">
            <div class="lb-rank ${rankCls}">${i+1}</div>
            <div class="member-ava" style="width:30px;height:30px;font-size:12px">${initials(c.name)}</div>
            <div class="lb-name">${esc(c.name)}<div style="font-size:11px;color:var(--text-3);font-weight:500">${c.jobs.size} job${c.jobs.size!==1?'s':''}${c.overdue>0?' · '+money(c.overdue)+' overdue':''}</div></div>
            <div class="lb-stats"><strong>${money(c.outstanding)}</strong><div>balance</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}

    <div class="toolbar" style="margin-top:8px">
      <div class="search-wrap">
        <div class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z"/></svg></div>
        <input class="search" id="inv-search" placeholder="Search invoice #, job, customer…" value="${esc(S.invSearch)}" aria-label="Search invoices">
      </div>
      <select class="form-select" id="inv-sort" style="max-width:160px;font-size:13px;padding:8px 10px" aria-label="Sort invoices">
        <option value="date" ${S.invSort==='date'?'selected':''}>Newest first</option>
        <option value="due" ${S.invSort==='due'?'selected':''}>Due soonest</option>
        <option value="amount" ${S.invSort==='amount'?'selected':''}>Largest total</option>
        <option value="balance" ${S.invSort==='balance'?'selected':''}>Largest balance</option>

function showDocumentUploadModal(presetCategory){
  const all=jobs();
  if(all.length===0){toast('Add a job first','');return}
  const presetJob=S.detail&&S.jobs[S.detail]?S.detail:'';
  const cat=presetCategory&&DOC_CAT[presetCategory]?presetCategory:'other';
  const jobOpts=all.map(j=>`<option value="${esc(j.id)}" ${j.id===presetJob?'selected':''}>${esc(j.name)}${j.customerName?' — '+esc(j.customerName):''}</option>`).join('');
  const catOpts=DOC_CAT_ORDER.map(k=>`<option value="${k}" ${cat===k?'selected':''}>${esc(DOC_CAT[k].label)}</option>`).join('');
  $('modal-root').innerHTML=`<div class="modal-bd" id="mbd" role="dialog" aria-modal="true" aria-label="Upload document"><div class="modal"><div class="modal-handle"></div>
    <div class="modal-head"><div class="modal-title">Upload Document</div><button class="modal-close" id="mc" aria-label="Close"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <p style="font-size:12.5px;color:var(--text-2);margin-bottom:10px">Documents are attached to a job so they stay organized with the rest of the project.</p>
      <div class="form-group"><label class="form-label" for="docu-job">Job</label>
        <select class="form-select" id="docu-job">${jobOpts}</select>
      </div>
      <div class="form-group"><label class="form-label" for="docu-cat">Category</label>
        <select class="form-select" id="docu-cat">${catOpts}</select>
        <div id="docu-cat-desc" style="font-size:11.5px;color:var(--text-3);margin-top:6px"></div>
      </div>
      <div class="form-group"><label class="form-label" for="docu-file">File <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3)">(PDF, DOC, IMG — max 5MB)</span></label>
        <input type="file" id="docu-file" class="form-input" accept="*/*">
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
        <button class="docs-menu-foot-btn" id="docu-cancel">Cancel</button>
        <button class="btn-add" id="docu-save">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Upload
        </button>
      </div>
    </div>
  </div></div>`;
  const updateDesc=()=>{const k=$('docu-cat').value;$('docu-cat-desc').textContent=DOC_CAT[k]?.desc||''};
  updateDesc();
  $('docu-cat').onchange=updateDesc;
  $('mc').onclick=$('docu-cancel').onclick=closeModal;
  $('mbd').onclick=e=>{if(e.target===e.currentTarget)closeModal()};
  $('docu-save').onclick=()=>{
    const jobId=$('docu-job').value;
    const category=$('docu-cat').value;
    const file=$('docu-file').files[0];
    if(!jobId){toast('Pick a job','');return}
    if(!file){toast('Choose a file','');return}
    if(file.size>5*1024*1024){toast('File too large (max 5MB)','');return}
    const j=S.jobs[jobId];if(!j)return;
    const r=new FileReader();
    r.onload=async e=>{
      j.documents=j.documents||[];
      j.documents.push({name:file.name,url:e.target.result,size:(file.size/1024).toFixed(0)+' KB',type:file.type,uploaded:Date.now(),user:S.user,category});
      await writeJob(j);await logAct('uploaded '+file.name+' ('+DOC_CAT[category].label+') to',j.name);
      closeModal();render();toast(DOC_CAT[category].label+' uploaded');
    };
    r.readAsDataURL(file);
  };
}

function buildInvoiceEmailText(j,inv,customMsg){
  const c=calcInvoice(inv);
  const co=COMPANY;
  const firstName=((j.customerName||'').trim().split(/\s+/)[0])||'there';
  const intro=customMsg||`Thanks for letting ${co.name||'us'} work with you on ${j.name||'your project'}. Your invoice is ready — details below.`;
  const items=(inv.items||[]).map(it=>{
    const amt=Number(it.qty||0)*Number(it.rate||0);
    return `  • ${(it.desc||'').padEnd(40)} ${(it.qty??'')+' × '+money(Number(it.rate||0))}   ${money(amt)}`;
  }).join('\n');
  const lines=[
    `Hi ${firstName},`,'',
    intro,'',
    `INVOICE ${inv.number||''}`,
    `Date: ${fmtDate(inv.date)||''}`,
    inv.dueDate?`Due:  ${fmtDate(inv.dueDate)}`:'',
    '','Line Items:',items||'  (none)','',
    `Subtotal:   ${money(c.sub)}`,
    `Tax (${Number(inv.taxRate||0)}%):  ${money(c.tax)}`,
    `Total:      ${money(c.total)}`,
    c.paid>0?`Paid:      -${money(c.paid)}`:'',
    c.balance<=0.005?`PAID IN FULL — Thank you!`:`Balance Due: ${money(c.balance)}`,
    '',
    inv.notes?'Notes:\n'+inv.notes+'\n':'',
    `Questions? Just reply to this email${co.phone?' or call '+co.phone:''}. We appreciate your business!`,'',
    `Thanks,`,S.user||co.name||'The Waterfront Solutions Team','',
    [co.name,co.phone,co.email,co.website].filter(Boolean).join(' · '),
    co.license?`License #${co.license}`:'',
    inv.terms?'\n'+inv.terms:''
  ].filter(l=>l!==undefined);
  return lines.join('\n').replace(/\n{3,}/g,'\n\n');
}

  const toEmail=j.customerEmail||'';
  const html=buildInvoiceEmailHTML(j,inv,customMsg);
  const text=buildInvoiceEmailText(j,inv,customMsg);
  const bnd='----=_Boundary_'+Date.now().toString(36);
  // Use base64 encoding to safely handle Unicode & long lines
  const enc=s=>{
    try{const b=typeof btoa==='function'?btoa(unescape(encodeURIComponent(s))):Buffer.from(s,'utf8').toString('base64');
      // Wrap to 76-char lines per RFC
      return b.replace(/(.{76})/g,'$1\r\n');
    }catch(e){return s}
  };
  const headers=[
    'MIME-Version: 1.0',
    `From: "${fromName}" <${fromEmail}>`,
    toEmail?`To: "${toName}" <${toEmail}>`:'',
    `Subject: ${subject}`,
    'X-Unsent: 1',
    `Content-Type: multipart/alternative; boundary="${bnd}"`,
  ].filter(Boolean).join('\r\n');
  const body=[
    '',
    `--${bnd}`,
    'Content-Type: text/plain; charset="UTF-8"',
    'Content-Transfer-Encoding: base64','',
    enc(text),
    `--${bnd}`,
    'Content-Type: text/html; charset="UTF-8"',
    'Content-Transfer-Encoding: base64','',
    enc(html),
    `--${bnd}--`,'',
  ].join('\r\n');
  return headers+'\r\n'+body;
}

async function copyHtmlToClipboard(html,text){
  try{
    if(window.ClipboardItem&&navigator.clipboard&&navigator.clipboard.write){
      const item=new ClipboardItem({
        'text/html':new Blob([html],{type:'text/html'}),
        'text/plain':new Blob([text],{type:'text/plain'}),
      });
      await navigator.clipboard.write([item]);
      return true;
    }
  }catch(e){}
  try{await navigator.clipboard.writeText(text);return true}catch(e){}
  return false;
}

function downloadFile(filename,content,mime){
  const blob=new Blob([content],{type:mime||'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

// ══ Time Tracking ══
// Each entry links to a job (→ client) and a date. Multiple entries per day across
// different jobs are fully supported — that's how a crew at 2+ sites in one day is logged.
function allTime(){return Object.values(S.time||{})}
function timeForJob(jobId){return allTime().filter(t=>t.jobId===jobId)}
function parseHHMM(s){if(!s||!/^\d{1,2}:\d{2}$/.test(s))return null;const[h,m]=s.split(':').map(Number);return h*60+m}
function entryHours(t){
  const a=parseHHMM(t.start),b=parseHHMM(t.end);
  if(a!=null&&b!=null){let diff=b-a;if(diff<0)diff+=24*60;/*overnight*/return Math.round((diff/60)*100)/100}
  return Math.round((Number(t.hours||0))*100)/100;
}
function entryCost(t){return entryHours(t)*Number(t.rate||0)}
function fmtHours(h){const v=Math.round(h*100)/100;return v.toLocaleString(undefined,{maximumFractionDigits:2})+'h'}
function fmt12(hhmm){const m=parseHHMM(hhmm);if(m==null)return'';let h=Math.floor(m/60),min=m%60;const ap=h>=12?'PM':'AM';h=h%12;if(h===0)h=12;return h+(min?':'+String(min).padStart(2,'0'):'')+ap}
function weekStart(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return x} // Sunday start
function timeInRange(dateStr,range){
  if(!dateStr)return range==='all';
  if(range==='all')return true;
  const d=new Date(dateStr+(dateStr.length===10?'T00:00:00':''));
  const now=new Date();
  if(range==='week'){const ws=weekStart(now);const we=new Date(ws);we.setDate(we.getDate()+7);return d>=ws&&d<we}
  if(range==='month')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(range==='ytd')return d.getFullYear()===now.getFullYear();
  return true;
}

function renderTimeView(){
  const range=S.timeRange||'week';
  const all=allTime();
  let inRangeList=all.filter(t=>timeInRange(t.date,range));
  // Stats over range
  const totalHours=inRangeList.reduce((s,t)=>s+entryHours(t),0);
  const totalCost=inRangeList.reduce((s,t)=>s+entryCost(t),0);
  const billableHours=inRangeList.filter(t=>t.billable!==false).reduce((s,t)=>s+entryHours(t),0);
  const workers=new Set(inRangeList.map(t=>t.worker).filter(Boolean));

  // By client/job
  const byJob={};
  inRangeList.forEach(t=>{
    const j=S.jobs[t.jobId];
    const key=t.jobId||'__none__';
    const cust=j?(j.customerName||'(no customer)'):'(deleted job)';
    byJob[key]=byJob[key]||{name:j?j.name:'(deleted job)',cust,hours:0,cost:0,count:0};
    byJob[key].hours+=entryHours(t);byJob[key].cost+=entryCost(t);byJob[key].count++;
  });
  const jobRows=Object.entries(byJob).sort((a,b)=>b[1].hours-a[1].hours);
  const maxJobHours=jobRows.reduce((m,[,v])=>Math.max(m,v.hours),0)||1;

  // By worker
  const byWorker={};
  inRangeList.forEach(t=>{
    const w=t.worker||'Unassigned';
    byWorker[w]=byWorker[w]||{hours:0,cost:0,count:0};
    byWorker[w].hours+=entryHours(t);byWorker[w].cost+=entryCost(t);byWorker[w].count++;
  });
  const workerRows=Object.entries(byWorker).sort((a,b)=>b[1].hours-a[1].hours);

  // Apply secondary filters to the list
  let shown=inRangeList.slice();
  if(S.timeJobFilter!=='all')shown=shown.filter(t=>t.jobId===S.timeJobFilter);
  if(S.timeWorkerFilter!=='all')shown=shown.filter(t=>(t.worker||'Unassigned')===S.timeWorkerFilter);
  // Group by date desc, entries within a day by start time
  shown.sort((a,b)=>(b.date||'').localeCompare(a.date||'')||((parseHHMM(a.start)??0)-(parseHHMM(b.start)??0)));
  const byDate={};
  shown.forEach(t=>{(byDate[t.date]=byDate[t.date]||[]).push(t)});
  const dateKeys=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  const ranges=[['week','This Week'],['month','This Month'],['ytd','Year to Date'],['all','All Time']];
  const jobOpts=Object.values(S.jobs).map(j=>`<option value="${esc(j.id)}" ${S.timeJobFilter===j.id?'selected':''}>${esc(j.name)}${j.customerName?' — '+esc(j.customerName):''}</option>`).join('');
  const workerOpts=Array.from(new Set(all.map(t=>t.worker).filter(Boolean))).sort().map(w=>`<option value="${esc(w)}" ${S.timeWorkerFilter===w?'selected':''}>${esc(w)}</option>`).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;font-weight:700">Labor</div>
        <div style="font-size:20px;font-weight:700;margin-top:2px">Time Tracking</div>
      </div>
      <button class="btn-add" id="btn-new-time" aria-label="Log time">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
        Log Time
      </button>
    </div>

    <div class="filter-row" style="margin-bottom:12px">
      ${ranges.map(([k,lbl])=>`<div class="filter-chip ${range===k?'active':''}" data-time-range="${k}">${lbl}</div>`).join('')}
    </div>

    <div class="kpi-grid">
      <div class="kpi-card accent"><div class="kpi-label">Total Hours</div><div class="kpi-value">${fmtHours(totalHours)}</div><div class="kpi-sub">${inRangeList.length} entr${inRangeList.length!==1?'ies':'y'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Labor Cost</div><div class="kpi-value">${money(totalCost)}</div><div class="kpi-sub">at logged rates</div></div>
      <div class="kpi-card"><div class="kpi-label">Billable Hours</div><div class="kpi-value">${fmtHours(billableHours)}</div><div class="kpi-sub">${totalHours>0?Math.round(billableHours/totalHours*100):0}% of total</div></div>
      <div class="kpi-card"><div class="kpi-label">Crew Members</div><div class="kpi-value">${workers.size}</div><div class="kpi-sub">logged this range</div></div>
    </div>

    ${jobRows.length?`<div class="report-section">
      <div class="report-hd">Hours by Job / Client <span class="kpi-sub">where labor is going</span></div>
      <div class="hbar-list">
        ${jobRows.slice(0,10).map(([key,v],i)=>{
          const color=CUSTOMER_BAR_COLORS[i%CUSTOMER_BAR_COLORS.length];
          const pct=(v.hours/maxJobHours)*100;
          return `<div class="hbar-row">
            <div class="hbar-top">
              <div class="hbar-name">${esc(v.name)}<small>${esc(v.cust)}</small></div>
              <div class="hbar-val">${fmtHours(v.hours)}</div>
            </div>
            <div class="hbar-track"><div class="hbar-fill" style="width:${pct.toFixed(2)}%;background:${color}"></div></div>
            <div class="hbar-meta"><span>${v.count} entr${v.count!==1?'ies':'y'}</span><span>${v.cost>0?money(v.cost)+' labor':''}</span></div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}

    ${workerRows.length?`<div class="report-section">
      <div class="report-hd">Hours by Crew Member</div>
      <div class="leaderboard">
        ${workerRows.slice(0,8).map(([name,v],i)=>{
          const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
          return `<div class="lb-row">
            <div class="lb-rank ${rankCls}">${i+1}</div>
            <div class="member-ava" style="width:30px;height:30px;font-size:12px">${initials(name)}</div>
            <div class="lb-name">${esc(name)}<div style="font-size:11px;color:var(--text-3);font-weight:500">${v.count} entr${v.count!==1?'ies':'y'}${v.cost>0?' · '+money(v.cost):''}</div></div>
            <div class="lb-stats"><strong>${fmtHours(v.hours)}</strong><div>hours</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}

    <div class="toolbar" style="margin-top:8px">
      <select class="form-select" id="time-jobfilter" style="flex:1;min-width:140px;font-size:13px;padding:8px 10px" aria-label="Filter by job">
        <option value="all" ${S.timeJobFilter==='all'?'selected':''}>All jobs</option>
        ${jobOpts}
      </select>
      <select class="form-select" id="time-workerfilter" style="max-width:170px;font-size:13px;padding:8px 10px" aria-label="Filter by crew member">
        <option value="all" ${S.timeWorkerFilter==='all'?'selected':''}>All crew</option>
        ${workerOpts}
      </select>
    </div>

    ${dateKeys.length===0?`<div class="empty" style="padding:44px 20px">
      <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
      <h3>${all.length===0?'No time logged yet':'No entries in range'}</h3>
      <p>${all.length===0?'Tap "Log Time" to record crew hours against a job. You can add multiple entries per day for different jobs.':'Try a different range or filter.'}</p>
    </div>`
      :dateKeys.map(dk=>{
        const entries=byDate[dk];
        const dayHours=entries.reduce((s,t)=>s+entryHours(t),0);
        const jobsThatDay=new Set(entries.map(e=>e.jobId)).size;
        return `<div class="time-day">
          <div class="time-day-hd">
            <div>${fmtDate(dk)}${jobsThatDay>1?` <span class="time-multi">${jobsThatDay} jobs</span>`:''}</div>
            <div class="time-day-total">${fmtHours(dayHours)}</div>
          </div>
          ${entries.map(t=>{
            const j=S.jobs[t.jobId];
            const rangeTxt=(t.start&&t.end)?fmt12(t.start)+' – '+fmt12(t.end):'';
            return `<div class="time-entry" data-time-open="${esc(t.id)}">
              <div class="time-entry-bar"></div>
              <div class="time-entry-main">
                <div class="time-entry-job">${j?esc(j.name):'(deleted job)'}${j&&j.customerName?` <span class="time-entry-cust">${esc(j.customerName)}</span>`:''}</div>
                <div class="time-entry-meta">${rangeTxt?rangeTxt+' · ':''}${t.worker?esc(t.worker):'Unassigned'}${t.billable===false?' · <span style="color:var(--text-3)">non-billable</span>':''}${t.notes?' · '+esc(t.notes.slice(0,40))+(t.notes.length>40?'…':''):''}</div>
              </div>
              <div class="time-entry-amt">
                <div class="time-entry-hrs">${fmtHours(entryHours(t))}</div>
                ${entryCost(t)>0?`<div class="time-entry-cost">${money(entryCost(t))}</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
  `;
}

        <div class="form-group"><label class="form-label" for="tm-end">End</label>
          <input type="time" class="form-input" id="tm-end" value="${esc(t.end||'')}">
        </div>
      </div>
      <div class="form-group"><label class="form-label" for="tm-hours">Hours <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3)">(auto from start/end, or enter manually)</span></label>
        <input type="number" step="0.25" min="0" class="form-input" id="tm-hours" value="${esc(t.hours||'')}" placeholder="0.0" inputmode="decimal">
        <div id="tm-calc" style="font-size:11.5px;color:var(--green-700);margin-top:6px;font-weight:600"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label class="form-label" for="tm-worker">Crew Member</label>
          <input list="tm-worker-list" class="form-input" id="tm-worker" value="${esc(t.worker||'')}" placeholder="Name">
          <datalist id="tm-worker-list">${memberSet.map(w=>`<option value="${esc(w)}">`).join('')}</datalist>
        </div>
        <div class="form-group"><label class="form-label" for="tm-rate">Rate ($/hr)</label>
          <input type="number" step="0.01" min="0" class="form-input" id="tm-rate" value="${esc(t.rate||'')}" placeholder="optional" inputmode="decimal">
        </div>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;cursor:pointer">
          <input type="checkbox" id="tm-billable" ${t.billable!==false?'checked':''} style="width:18px;height:18px;cursor:pointer">
          <span><strong>Billable</strong> — counts toward billable labor</span>
        </label>
      </div>
      <div class="form-group"><label class="form-label" for="tm-notes">Notes</label>
        <textarea class="form-textarea" id="tm-notes" rows="2" placeholder="What was done">${esc(t.notes||'')}</textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:space-between;margin-top:8px;flex-wrap:wrap">
        ${editing?`<button class="docs-menu-foot-btn" id="tm-delete" style="color:var(--red);border-color:var(--red)">Delete</button>`:'<div></div>'}
        <div style="display:flex;gap:8px">
          ${!editing?`<button class="docs-menu-foot-btn" id="tm-save-another" title="Save and log another entry for the same day — handy for a second job">Save + Add Another</button>`:''}
          <button class="docs-menu-foot-btn" id="tm-cancel">Cancel</button>
          <button class="btn-add" id="tm-save">${editing?'Save':'Log Time'}</button>
        </div>
      </div>
    </div>
  </div></div>`;
  const calc=()=>{
    const a=parseHHMM($('tm-start').value),b=parseHHMM($('tm-end').value);
    if(a!=null&&b!=null){let d=b-a;if(d<0)d+=1440;const h=Math.round(d/60*100)/100;$('tm-hours').value=h;$('tm-calc').textContent='= '+fmtHours(h)+(parseHHMM($('tm-end').value)<parseHHMM($('tm-start').value)?' (overnight)':'')}
    else $('tm-calc').textContent='';
  };
  $('tm-start').onchange=calc;$('tm-end').onchange=calc;calc();
  $('mc').onclick=$('tm-cancel').onclick=closeModal;
  $('mbd').onclick=e=>{if(e.target===e.currentTarget)closeModal()};
  if(editing){
    $('tm-delete').onclick=async()=>{
      if(!confirm('Delete this time entry? This can be undone right after.'))return;
      const backup=JSON.parse(JSON.stringify(S.time[timeId]));
      await deleteTimeDB(timeId);
      const jn=S.jobs[backup.jobId]?S.jobs[backup.jobId].name:'';
      await logAct('deleted a time entry'+(jn?' from':''),jn);
      closeModal();render();
      UNDO.push(async()=>{await writeTime(backup);render();toast('Time entry restored')});
      toast('Time entry deleted','undo',()=>{UNDO.pop()()});
    };
  }
  const collect=()=>{
    const jobId=$('tm-job').value;
    const start=$('tm-start').value,end=$('tm-end').value;
    let hours=parseFloat($('tm-hours').value)||0;
    if((!hours||hours<=0)&&parseHHMM(start)!=null&&parseHHMM(end)!=null){let d=parseHHMM(end)-parseHHMM(start);if(d<0)d+=1440;hours=Math.round(d/60*100)/100}
    return {
      id:t.id,jobId,date:$('tm-date').value||dateKey(new Date()),
      start,end,hours,
      worker:$('tm-worker').value.trim(),
      rate:parseFloat($('tm-rate').value)||0,
      billable:$('tm-billable').checked,
      notes:$('tm-notes').value.trim(),
      created:t.created||Date.now(),updated:Date.now(),user:S.user||t.user||'',
    };
  };
  const save=async(addAnother)=>{
    const rec=collect();
    if(!rec.jobId){toast('Pick a job','');return}
    if(entryHours(rec)<=0){toast('Enter hours or a start/end time','');return}
    await writeTime(rec);
    const j=S.jobs[rec.jobId];
    await logAct((editing?'edited':'logged')+' '+fmtHours(entryHours(rec))+(j?' on':''),j?j.name:'');
    if(addAnother){
      // Keep same date, clear job/time so the next site can be entered fast
      toast('Saved — add the next job');
      showTimeModal(null,'',rec.date);
    }else{closeModal();render();toast(editing?'Time updated':'Time logged')}
  };
  $('tm-save').onclick=()=>save(false);
  if(!editing)$('tm-save-another').onclick=()=>save(true);
}

// ══ Clients ══
// Clients are derived by grouping jobs on customer name (case-insensitive).
function getAllClients(){
  const map={};
  Object.values(S.jobs).forEach(j=>{
    const raw=(j.customerName||'').trim();
    if(!raw)return; // skip jobs with no customer
    const key=raw.toLowerCase();
    if(!map[key]){
      map[key]={key,name:raw,jobs:[],phone:'',email:'',address:'',
        revenue:0,pipeline:0,invoiced:0,paid:0,outstanding:0,
        firstJob:Infinity,lastJob:0,statuses:{lead:0,active:0,complete:0,hold:0},
        invoiceCount:0,receiptTotal:0,leadSource:''};
    }
    const c=map[key];
    c.jobs.push(j);
    if(!c.phone&&j.customerPhone)c.phone=j.customerPhone;
    if(!c.email&&j.customerEmail)c.email=j.customerEmail;
    if(!c.address&&j.address)c.address=j.address;
    if(!c.leadSource&&j.leadSource)c.leadSource=j.leadSource;
    c.firstJob=Math.min(c.firstJob,j.created||Infinity);
    c.lastJob=Math.max(c.lastJob,j.created||0);
    c.statuses[j.status]=(c.statuses[j.status]||0)+1;
    c.pipeline+=(j.status!=='complete'&&j.status!=='hold')?Number(j.value||0):0;
    if(j.status==='complete')c.revenue+=jobRevenue(j);
    const inv=invoiceTotals(j);
    if(inv){c.invoiced+=inv.total;c.paid+=inv.paid;c.outstanding+=inv.balance}
    c.invoiceCount+=(j.invoices||[]).length;
    c.receiptTotal+=jobReceiptCosts(j);
  });
  return Object.values(map);
}

function renderClients(){

  const sortFn={
    revenue:(a,b)=>b.revenue-a.revenue,
    recent:(a,b)=>b.lastJob-a.lastJob,
    name:(a,b)=>a.name.localeCompare(b.name),
    jobs:(a,b)=>b.jobs.length-a.jobs.length,
    outstanding:(a,b)=>b.outstanding-a.outstanding,
  }[S.clientSort]||((a,b)=>b.revenue-a.revenue);
  shown.sort(sortFn);

  const totalRev=clients.reduce((s,c)=>s+c.revenue,0);

        New Client

    <div class="kpi-grid">
      <div class="kpi-card accent"><div class="kpi-label">Total Clients</div><div class="kpi-value">${clients.length}</div><div class="kpi-sub">${repeat} repeat</div></div>
      <div class="kpi-card"><div class="kpi-label">Lifetime Revenue</div><div class="kpi-value">${money(totalRev)}</div><div class="kpi-sub">all clients</div></div>
      <div class="kpi-card"><div class="kpi-label">Outstanding</div><div class="kpi-value" style="color:${totalOut>0?'var(--orange)':'var(--text)'}">${money(totalOut)}</div><div class="kpi-sub">across clients</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Revenue</div><div class="kpi-value">${money(clients.length?totalRev/clients.length:0)}</div><div class="kpi-sub">per client</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <div class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z"/></svg></div>
        <input class="search" id="client-search" placeholder="Search clients, phone, email…" value="${esc(S.clientSearch||'')}" aria-label="Search clients">
      </div>
      <select class="form-select" id="client-sort" style="max-width:170px;font-size:13px;padding:8px 10px" aria-label="Sort clients">
        <option value="revenue" ${S.clientSort==='revenue'?'selected':''}>Top revenue</option>
        <option value="recent" ${S.clientSort==='recent'?'selected':''}>Most recent</option>
        <option value="jobs" ${S.clientSort==='jobs'?'selected':''}>Most jobs</option>
        <option value="outstanding" ${S.clientSort==='outstanding'?'selected':''}>Outstanding</option>
        <option value="name" ${S.clientSort==='name'?'selected':''}>Name (A–Z)</option>
      </select>
    </div>

    ${shown.length===0?`<div class="empty" style="padding:48px 20px">
      <div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg></div>
      <h3>${clients.length===0?'No clients yet':'No matches'}</h3>
      <p>${clients.length===0?'Clients appear automatically when you add a job with a customer name. Add your first job to get started.':'Try a different search.'}</p>
    </div>`
      :`<div class="client-list">
        ${shown.map(c=>{
          const activeCnt=c.statuses.active||0;
          return `<div class="client-card" data-client="${esc(c.key)}">
            <div class="client-ava">${initials(c.name)}</div>

          </div>`;
        }).join('')}
      </div>`}
  `;

function renderClientDetail(key){
  const client=getAllClients().find(c=>c.key===key);
  const back=`<button class="detail-back" id="btn-client-back"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/></svg>All Clients</button>`;
  if(!client)return back+`<p style="color:var(--text-2)">Client not found.</p>`;
  const c=client;
  const jobsSorted=c.jobs.slice().sort((a,b)=>(b.created||0)-(a.created||0));
  const avgJob=c.statuses.complete?c.revenue/c.statuses.complete:0;
  const tenure=c.firstJob<Infinity?Math.max(1,Math.round((Date.now()-c.firstJob)/86400000)):0;

  // Invoices across this client's jobs
  const invoices=[];
  c.jobs.forEach(j=>(j.invoices||[]).forEach(inv=>invoices.push({inv,job:j})));
  invoices.sort((a,b)=>(b.inv.date||'').localeCompare(a.inv.date||''));
  // Receipts across this client's jobs
  const recs=[];
  c.jobs.forEach(j=>receiptsForJob(j.id).forEach(r=>recs.push({r,job:j})));
  recs.sort((a,b)=>(b.r.date||'').localeCompare(a.r.date||''));
  const recTotal=recs.reduce((s,x)=>s+Number(x.r.amount||0),0);
  // Communications across this client's jobs
  const comms=[];
  c.jobs.forEach(j=>(j.comms||[]).forEach(m=>comms.push({m,job:j})));
  comms.sort((a,b)=>(b.m.time||0)-(a.m.time||0));
  // Time entries across this client's jobs
  const timeEntries=[];
  c.jobs.forEach(j=>timeForJob(j.id).forEach(t=>timeEntries.push({t,job:j})));
  timeEntries.sort((a,b)=>(b.t.date||'').localeCompare(a.t.date||''));
  const clientHours=timeEntries.reduce((s,x)=>s+entryHours(x.t),0);
  const clientLaborCost=timeEntries.reduce((s,x)=>s+entryCost(x.t),0);

  const tab=S.clientTab||'overview';
  const tabs=[
    ['overview','Overview'],
    ['jobs','Jobs',c.jobs.length],
    ['invoices','Invoices',invoices.length],
    ['receipts','Receipts',recs.length],
    ['time','Time',timeEntries.length],
    ['comms','Comms',comms.length],
  ];

  const statusChip=(j)=>`<span class="status-pill ${spClass(j.status)}">${spLabel(j.status)}</span>`;

  let body='';
  if(tab==='overview'){
    body=`
      <div class="report-section">
        <div class="report-hd">Contact</div>
        <div class="client-contact-grid">
          ${c.phone?`<a class="client-contact" href="tel:${esc(c.phone)}"><div class="cc-ico"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg></div><div><div class="cc-lbl">Phone</div><div class="cc-val">${esc(c.phone)}</div></div></a>`:''}
          ${c.email?`<a class="client-contact" href="mailto:${esc(c.email)}"><div class="cc-ico"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg></div><div><div class="cc-lbl">Email</div><div class="cc-val">${esc(c.email)}</div></div></a>`:''}
          ${c.address?`<a class="client-contact" href="https://maps.google.com/?q=${encodeURIComponent(c.address)}" target="_blank"><div class="cc-ico"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg></div><div><div class="cc-lbl">Address</div><div class="cc-val">${esc(c.address)}</div></div></a>`:''}
          ${c.leadSource?`<div class="client-contact" style="cursor:default"><div class="cc-ico"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg></div><div><div class="cc-lbl">Lead Source</div><div class="cc-val">${esc(c.leadSource)}</div></div></div>`:''}
        </div>
        ${!c.phone&&!c.email&&!c.address?'<p style="font-size:12.5px;color:var(--text-3)">No contact info on file. Add it on any of this client\'s jobs.</p>':''}
      </div>

      <div class="report-section">
        <div class="report-hd">Job Mix</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${[['lead','Leads'],['active','Active'],['complete','Completed'],['hold','On Hold']].map(([k,l])=>`
            <div class="client-mix-chip"><span class="status-dot ${sdClass(k)}" style="position:static;border:none;width:8px;height:8px"></span>${l} <strong>${c.statuses[k]||0}</strong></div>
          `).join('')}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:18px;margin-top:14px;font-size:12.5px;color:var(--text-2)">
          <div><div style="color:var(--text-3);font-size:11px">First job</div><strong>${c.firstJob<Infinity?fmtDate(new Date(c.firstJob).toISOString().slice(0,10)):'—'}</strong></div>
          <div><div style="color:var(--text-3);font-size:11px">Last job</div><strong>${c.lastJob?fmtDate(new Date(c.lastJob).toISOString().slice(0,10)):'—'}</strong></div>
          <div><div style="color:var(--text-3);font-size:11px">Client for</div><strong>${tenure>=365?(tenure/365).toFixed(1)+' yr':tenure+' days'}</strong></div>
          <div><div style="color:var(--text-3);font-size:11px">Tracked expenses</div><strong>${money(c.receiptTotal)}</strong></div>
          <div><div style="color:var(--text-3);font-size:11px">Labor logged</div><strong>${fmtHours(clientHours)}${clientLaborCost>0?' · '+money(clientLaborCost):''}</strong></div>
        </div>
      </div>
    `;
  } else if(tab==='jobs'){
    body=`<div class="client-section-list">
      ${jobsSorted.map(j=>{
        const bal=jobBalance(j);
        return `<div class="client-row" data-jump-job="${esc(j.id)}">
          <div class="client-row-main">
            <div class="client-row-title">${esc(j.name)} ${statusChip(j)}</div>
            <div class="client-row-sub">${esc(j.address||'No address')}${j.created?' · added '+fmtDate(new Date(j.created).toISOString().slice(0,10)):''}</div>
          </div>
          <div class="client-row-amt">${money(jobRevenue(j))}<div class="client-row-amt-sub">${bal>0.005?money(bal)+' due':'—'}</div></div>
        </div>`;
      }).join('')}
    </div>`;
  } else if(tab==='invoices'){
    body=invoices.length===0?'<p style="font-size:13px;color:var(--text-3);padding:10px 2px">No invoices for this client yet.</p>'
      :`<div class="client-section-list">
        ${invoices.map(({inv,job})=>{
          const ci=calcInvoice(inv);const st=invoiceStatus(inv);
          return `<div class="client-row" data-open-inv="${esc(job.id)}|${esc(inv.id)}">
            <div class="client-row-main">
              <div class="client-row-title">${esc(inv.number||'(no #)')} <span class="invoice-status ${st}">${st}</span></div>
              <div class="client-row-sub">${esc(job.name||'')}${inv.date?' · '+fmtDate(inv.date):''}</div>
            </div>
            <div class="client-row-amt">${money(ci.total)}<div class="client-row-amt-sub" style="color:${ci.balance>0.005?'var(--orange)':'var(--green-700)'}">${ci.balance>0.005?money(ci.balance)+' due':'paid'}</div></div>
          </div>`;
        }).join('')}
      </div>`;
  } else if(tab==='receipts'){
    body=recs.length===0?'<p style="font-size:13px;color:var(--text-3);padding:10px 2px">No receipts linked to this client\'s jobs.</p>'
      :`<div style="font-size:12.5px;color:var(--text-2);margin-bottom:10px">Total tracked: <strong>${moneyCents(recTotal)}</strong> across ${recs.length} receipt${recs.length!==1?'s':''}</div>
        <div class="client-section-list">
        ${recs.map(({r,job})=>{
          const cat=RECEIPT_CAT[recCat(r)];
          return `<div class="client-row" data-rec-open="${esc(r.id)}">
            <div class="client-row-main">
              <div class="client-row-title"><span class="rec-cat-pill">${esc(cat.label.split(' ')[0])}</span>${esc(r.vendor||'(no vendor)')}</div>
              <div class="client-row-sub">${esc(job.name||'')}${r.date?' · '+fmtDate(r.date):''}</div>
            </div>
            <div class="client-row-amt">${moneyCents(r.amount)}</div>
          </div>`;
        }).join('')}

// ── Reports: shared helpers ──
function jobRevenue(j){
  // Prefer actual invoiced/paid (more accurate when invoices exist); fall back to value (estimate)
  const inv=invoiceTotals(j);
  if(inv&&inv.total>0)return inv.total;
  return Number(j.invoiced||0)||Number(j.value||0);
}
function jobReceiptCosts(j){return receiptsForJob(j.id).reduce((s,r)=>s+Number(r.amount||0),0)}
function jobTotalCosts(j){return Number(j.costs||0)+jobReceiptCosts(j)}
function jobProfit(j){return jobRevenue(j)-jobTotalCosts(j)}
function monthKey(t){const d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
function lastNMonths(n){
  const out=[];const now=new Date();
  for(let i=n-1;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    out.push({label:d.toLocaleDateString(undefined,{month:'short'}),key:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')});
  }
  return out;
}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}

  return header+body;

function renderReportProfit(){
  const range=parseInt(S.reportRange||'90',10);
  const cutoff=range>0?Date.now()-range*86400000:0;
  const all=jobs();
  // Consider all jobs with any revenue OR costs OR receipts in range; profit makes most sense for completed jobs
  const completed=all.filter(j=>j.status==='complete'&&(j.created||0)>=cutoff);
  const allActive=all.filter(j=>(j.created||0)>=cutoff);

  const revenue=completed.reduce((s,j)=>s+jobRevenue(j),0);
  const directCosts=completed.reduce((s,j)=>s+Number(j.costs||0),0);
  const trackedExp=completed.reduce((s,j)=>s+jobReceiptCosts(j),0);
  const totalCosts=directCosts+trackedExp;
  const profit=revenue-totalCosts;
  const margin=revenue>0?(profit/revenue)*100:0;

  // Per-job profit table (completed only)
  const jobRows=completed.map(j=>{
    const rev=jobRevenue(j),cost=jobTotalCosts(j),p=rev-cost,m=rev>0?(p/rev)*100:0;
    return {j,rev,cost,profit:p,margin:m};
  });
  const topProfit=jobRows.slice().sort((a,b)=>b.profit-a.profit).slice(0,5);
  const worstProfit=jobRows.slice().sort((a,b)=>a.profit-b.profit).slice(0,5);

  // Monthly P&L — last 6 months (revenue vs costs as paired bars)
  const months=lastNMonths(6).map(m=>({...m,rev:0,cost:0}));
  all.forEach(j=>{
    if(j.status==='complete'){
      const t=j.completedAt||j.created;if(t){const m=months.find(x=>x.key===monthKey(t));if(m){m.rev+=jobRevenue(j);m.cost+=Number(j.costs||0)}}
    }
  });
  allReceipts().forEach(r=>{
    if(!r.date)return;
    const m=months.find(x=>x.key===monthKey(r.date+(r.date.length===10?'T00:00:00':'')));
    if(m)m.cost+=Number(r.amount||0);
  });
  const maxBar=Math.max(1,...months.map(m=>Math.max(m.rev,m.cost)));

  return `
    <div class="kpi-grid">
      <div class="kpi-card accent"><div class="kpi-label">Revenue</div><div class="kpi-value">${money(revenue)}</div><div class="kpi-sub">${completed.length} completed job${completed.length!==1?'s':''}</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Costs</div><div class="kpi-value">${money(totalCosts)}</div><div class="kpi-sub">${money(directCosts)} direct + ${money(trackedExp)} receipts</div></div>
      <div class="kpi-card"><div class="kpi-label">Net Profit</div><div class="kpi-value" style="color:${profit>=0?'var(--green-700)':'var(--red)'}">${money(profit)}</div><div class="kpi-sub">in selected range</div></div>
      <div class="kpi-card"><div class="kpi-label">Profit Margin</div><div class="kpi-value" style="color:${margin>=20?'var(--green-700)':margin>=10?'var(--text)':'var(--orange)'}">${margin.toFixed(1)}%</div><div class="kpi-sub">${margin>=20?'healthy':margin>=10?'okay':margin>=0?'thin':'losing money'}</div></div>
    </div>

    <div class="report-section">
      <div class="report-hd">Revenue vs Costs <span class="kpi-sub">Last 6 months</span></div>
      <div class="rvc-chart">
        ${months.map(m=>{
          const rh=(m.rev/maxBar)*100,ch=(m.cost/maxBar)*100;
          const mProfit=m.rev-m.cost;
          return `<div class="rvc-month">
            <div class="rvc-bars" title="Revenue ${money(m.rev)} · Costs ${money(m.cost)} · Profit ${money(mProfit)}">
              <div class="rvc-bar rvc-rev" style="height:${Math.max(1,rh)}%"></div>
              <div class="rvc-bar rvc-cost" style="height:${Math.max(1,ch)}%"></div>
            </div>
            <div class="rvc-lbl">${m.label}</div>
            <div class="rvc-pl" style="color:${mProfit>=0?'var(--green-700)':'var(--red)'}">${mProfit>=0?'+':''}${money(mProfit)}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:14px;font-size:11.5px;color:var(--text-2);margin-top:10px;justify-content:center">
        <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:11px;height:11px;background:var(--green-700);border-radius:3px"></span>Revenue</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:11px;height:11px;background:#dc2626;border-radius:3px"></span>Costs</span>
      </div>
    </div>

    ${jobRows.length===0?`<div class="report-section"><div class="report-hd">Per-Job Profit</div><p style="font-size:13px;color:var(--text-3)">No completed jobs in this range yet.</p></div>`:`
    <div class="report-section">
      <div class="report-hd">Most Profitable Jobs <span class="kpi-sub">top ${topProfit.length}</span></div>
      <div class="leaderboard">
        ${topProfit.map((row,i)=>{
          const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
          return `<div class="lb-row" data-jump-job="${esc(row.j.id)}" style="cursor:pointer">
            <div class="lb-rank ${rankCls}">${i+1}</div>
            <div class="lb-name">${esc(row.j.name)}<div style="font-size:11px;color:var(--text-3);font-weight:500">${esc(row.j.customerName||'')} · ${money(row.rev)} rev · ${money(row.cost)} cost</div></div>
            <div class="lb-stats"><strong style="color:var(--green-700)">${money(row.profit)}</strong><div>${row.margin.toFixed(0)}% margin</div></div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="report-section">
      <div class="report-hd">Least Profitable Jobs <span class="kpi-sub">${worstProfit.filter(r=>r.profit<topProfit[topProfit.length-1]?.profit).length||worstProfit.length} flagged</span></div>
      <div class="leaderboard">
        ${worstProfit.map((row,i)=>`<div class="lb-row" data-jump-job="${esc(row.j.id)}" style="cursor:pointer">
          <div class="lb-rank" style="background:${row.profit<0?'#fee2e2':'var(--surface-3)'};color:${row.profit<0?'var(--red)':'var(--text-2)'}">${i+1}</div>
          <div class="lb-name">${esc(row.j.name)}<div style="font-size:11px;color:var(--text-3);font-weight:500">${esc(row.j.customerName||'')} · ${money(row.rev)} rev · ${money(row.cost)} cost</div></div>
          <div class="lb-stats"><strong style="color:${row.profit<0?'var(--red)':'var(--text)'}">${money(row.profit)}</strong><div>${row.margin.toFixed(0)}% margin</div></div>
        </div>`).join('')}
      </div>
    </div>`}
  `;
}

function renderReportInvoices(){
