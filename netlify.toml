# Netlify config — static single-page app + one serverless function.
# The app (index.html) talks to Firebase Auth + Realtime Database directly
# from the browser. The function (netlify/functions/send-invoice) emails
# invoices/estimates as a PDF via your Google Workspace SMTP.
[build]
  publish = "."
  command = "echo 'No build needed — static site'"

[build.environment]
  # Node 22: firebase-admin's transitive dep `jose` is ESM-only, and require()
  # of an ES module is only supported on Node 20.19+/22+. Node 18 throws
  # ERR_REQUIRE_ESM at function load. Keep this at 22 for the functions runtime.
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # firebase-admin has dynamic requires / optional native deps that esbuild
  # can't bundle cleanly — install it at runtime instead of inlining it.
  external_node_modules = ["firebase-admin"]

# Weekly financial report — targets 7 AM US Eastern on Fridays. Netlify cron is
# UTC-only and can't track DST, so we fire at BOTH 11:00 and 12:00 UTC and the
# function itself only proceeds at 7 AM ET (see weekly-report.js).
[functions."weekly-report"]
  schedule = "0 11,12 * * 5"

# OAuth discovery must 404 (these MUST come before the SPA catch-all below).
# Without this, the "/*" rule answers /.well-known/oauth-* probes with the app
# HTML at 200, so MCP clients (e.g. Claude connectors) think an OAuth server
# lives here and then fail dynamic client registration. Returning 404 tells the
# client there is no OAuth here, so it connects to the MCP server unauthenticated
# (the mcp function takes the API key via ?key= / Authorization). See mcp.js.
[[redirects]]
  from = "/.well-known/oauth-authorization-server*"
  to = "/mcp-no-oauth"
  status = 404
  force = true

[[redirects]]
  from = "/.well-known/oauth-protected-resource*"
  to = "/mcp-no-oauth"
  status = 404
  force = true

[[redirects]]
  from = "/.well-known/openid-configuration*"
  to = "/mcp-no-oauth"
  status = 404
  force = true

# Serve the app for any unknown path (SPA-style fallback). Real files that
# exist (like the dev sandbox) are still served directly.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
